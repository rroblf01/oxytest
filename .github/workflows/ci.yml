name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.14"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v7
      - name: Install linters
        run: uv pip install ruff ty tomli --system
      - name: Run ruff
        run: ruff check python/ tests/ --ignore=E501
      - name: Run ty
        run: ty check python/oxytest/ --python-version 3.14

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - name: Build wheel (Debug)
        run: |
          uv pip install maturin --system
          maturin build --out dist
      - name: Install wheel
        run: uv pip install dist/*.whl --system
      - name: Run tests
        run: |
          python -m pytest tests/ -v
          oxytest tests/sample_tests/ -v

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Build wheel (Debug)
        run: |
          uv pip install maturin --system
          maturin build --out dist
      - name: Install wheel
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          uv pip install $wheel.FullName --system
      - name: Run tests
        run: |
          python -m pytest tests/ -v
          oxytest tests/sample_tests/ -v

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Build wheel (Debug)
        run: |
          uv pip install maturin --system
          maturin build --out dist
      - name: Install wheel
        run: uv pip install dist/*.whl --system
      - name: Run tests
        run: |
          python -m pytest tests/ -v
          oxytest tests/sample_tests/ -v