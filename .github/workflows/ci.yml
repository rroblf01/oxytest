name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.14"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v7
      - name: Install linters
        run: uv sync --extra lint
      - name: Run ruff
        run: uv run ruff check python/ tests/ --ignore=E501
      - name: Run ty
        run: uv run ty check python/oxytest/ --python-version 3.14 --exit-zero --output-format github

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - name: Build wheel
        run: |
          uv pip install maturin --system
          maturin build --out dist --release
      - name: Install wheel and test deps
        run: |
          uv pip install --system dist/*.whl
          uv pip install --system pytest
      - name: Run tests
        run: |
          python -m pytest tests/ -v --ignore=tests/sample_tests
          python -m oxytest tests/sample_tests/ -v || true

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - name: Build wheel
        run: |
          uv pip install maturin --system
          maturin build --out dist --release
      - name: Install wheel and test deps
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          uv pip install --system $wheel.FullName
          uv pip install --system pytest
      - name: Run tests
        shell: pwsh
        run: |
          python -m pytest tests/ -v --ignore=tests/sample_tests
          python -m oxytest tests/sample_tests/ -v || true

  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Build wheel
        run: |
          uv pip install maturin --system
          maturin build --out dist --release
      - name: Install wheel and test deps
        run: |
          uv pip install --system dist/*.whl
          uv pip install --system pytest
      - name: Run tests
        run: |
          python -m pytest tests/ -v --ignore=tests/sample_tests
          python -m oxytest tests/sample_tests/ -v || true

