name: Build & deploy docs

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
  workflow_dispatch:

# Docs only deploy after a PyPI publish (or manual trigger).
# Cancel any in-flight builds to avoid burning runner minutes.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install
        run: uv sync --extra docs

      - name: Build site
        env:
          SITE_URL: https://rroblf01.github.io/oxytest/
        run: uv run mkdocs build --strict

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # GitHub Pages requires deploys to a given environment to be
    # serialised — never cancelled mid-flight or two deploys can
    # race the live site. The workflow-level concurrency above
    # already cancels superseded *builds*; this job-level group
    # only kicks in once the build artefact is ready.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5